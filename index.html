<!DOCTYPE html>

<html>

<head>

<title>ESP32 Control</title>


<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>


<style>

body{
font-family:tahoma;
text-align:center;
background:#222;
color:white;
}

button{

width:120px;
height:50px;
margin:10px;
font-size:18px;

}


.card{

background:#333;
padding:20px;
margin:20px;
border-radius:20px;

}

</style>

</head>


<body>


<h1>
ESP32 Remote Control
</h1>


<div class="card">

<h2>Relay Control</h2>


<button onclick="send('relay1_on')">
Relay 1 ON
</button>

<button onclick="send('relay1_off')">
Relay 1 OFF
</button>



<br>


<button onclick="send('relay2_on')">
Relay 2 ON
</button>

<button onclick="send('relay2_off')">
Relay 2 OFF
</button>


<br>


<button onclick="send('relay3_on')">
Relay 3 ON
</button>

<button onclick="send('relay3_off')">
Relay 3 OFF
</button>


<br>


<button onclick="send('relay4_on')">
Relay 4 ON
</button>

<button onclick="send('relay4_off')">
Relay 4 OFF
</button>


</div>



<div class="card">

<h2>
Sensor
</h2>


<h3>
Temperature:
<span id="temp">
--
</span>
°C
</h3>


<h3>
Humidity:
<span id="hum">
--
</span>
%
</h3>


</div>




<script>


const broker =
"wss://279d1c30c53e417b9a7355326f379152.s1.eu.hivemq.cloud:8884/mqtt";



const client =
mqtt.connect(broker,{

username:"ESP32-01",

password:"ESP32.23"

});





client.on("connect",()=>{


console.log("connected");


client.subscribe(
"home/esp32/sensor"
);


});






function send(cmd)
{


client.publish(
"home/esp32/relay",
cmd
);


}






client.on("message",(topic,message)=>{


let data=
JSON.parse(message.toString());



document.getElementById("temp").innerHTML=
data.temp;


document.getElementById("hum").innerHTML=
data.humidity;



});



</script>


</body>

</html>
